name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cpp:
    name: C++ Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        mode: [release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure xmake
        run: xmake config -m ${{ matrix.mode }} -y

      - name: Build
        run: xmake build -y

  lint-cpp:
    name: C++ clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and generate compile_commands.json
        run: |
          xmake config -m release -y
          xmake project -k compile_commands

      - name: Run clang-tidy
        run: |
          clang-tidy \
            -p . \
            --warnings-as-errors='*' \
            --checks='-*,bugprone-*,performance-*,readability-*,modernize-*,-modernize-use-trailing-return-type,-readability-identifier-length,-readability-magic-numbers' \
            src/main.cpp \
            -- || true

  typecheck-ts:
    name: TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: openclaw-plugin
        run: pnpm install

      - name: TypeScript type check
        working-directory: openclaw-plugin
        run: pnpm run build

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-cpp, lint-cpp, typecheck-ts]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-cpp.result }}" = "success" ]; then
            echo "| C++ Build | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| C++ Build | :x: ${{ needs.build-cpp.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.lint-cpp.result }}" = "success" ]; then
            echo "| C++ clang-tidy | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| C++ clang-tidy | :warning: ${{ needs.lint-cpp.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.typecheck-ts.result }}" = "success" ]; then
            echo "| TypeScript type check | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| TypeScript type check | :x: ${{ needs.typecheck-ts.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if build or typecheck failed (lint is advisory)
          if [ "${{ needs.build-cpp.result }}" != "success" ] || [ "${{ needs.typecheck-ts.result }}" != "success" ]; then
            echo ""
            echo "::error::One or more required checks failed."
            exit 1
          fi
